<html>
<head>
    <title>Add Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Hospital Management System</span>
  </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">Add New Hospital</h2>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Treatment</label>
            <input type="text" name="treatment" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Cost</label>
            <input type="number" name="cost" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating</label>
            <input type="number" step="0.1" name="rating" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">ICU Available</label>
            <select name="icu" class="form-select">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Ambulance Available</label>
            <select name="ambulance" class="form-select">
                <option value="Yes">Yes</option>
                <option value="No">No</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Add Hospital</button>
        <a href="/" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
